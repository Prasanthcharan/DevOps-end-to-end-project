name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "snappaste-backend/**"
      - ".github/workflows/backend.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION: us-east-1
  ECR_REPO: snappaste-backend
  K8S_DEPLOYMENT: backend
  K8S_CONTAINER: backend
  K8S_NAMESPACE: snappaste

jobs:
  # ──────────────────────────────────────────────
  # Build → Trivy scan → Push to ECR
  # ──────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: [self-hosted, linux, x64]
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      ecr_url: ${{ steps.ecr.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get ECR URL
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "url=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ steps.ecr.outputs.url }}

      - name: Build Docker image
        working-directory: snappaste-backend
        run: |
          docker build \
            --tag ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }} \
            .

      - name: Trivy image scan
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --no-progress \
            ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }}

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr.outputs.url }}:${{ steps.tag.outputs.tag }}

  # ──────────────────────────────────────────────
  # Deploy to EKS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'dev' }})
    runs-on: [self-hosted, linux, x64]
    needs: build-push
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name snappaste-${{ env.TF_ENV }}-eks \
            --region ${{ env.AWS_REGION }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          helm upgrade --install snappaste-backend \
            snappaste-infra/helm/backend \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --values snappaste-infra/helm/backend/values/${{ env.TF_ENV }}.yaml \
            --set image.repository=${{ needs.build-push.outputs.ecr_url }} \
            --set image.tag=${{ needs.build-push.outputs.image_tag }} \
            --wait \
            --timeout 3m
